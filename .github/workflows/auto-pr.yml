name: auto-pr

on:
  pull_request_target:
    types: [opened, synchronize, reopened]
  issue_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write
  issues: write

env:
  PAT: ${{ secrets.PAT || github.token }}
  GH_TOKEN: ${{ secrets.PAT || github.token }}

concurrency:
  group: auto-pr-${{ github.event.pull_request.number || github.event.issue.number }}
  cancel-in-progress: true

jobs:
  # ═══════════════════════════════════════════════════════════════
  #  Job 1 — PR opened / sync / reopen
  # ═══════════════════════════════════════════════════════════════
  triage:
    if: ${{ github.event_name == 'pull_request_target' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      # Checkout ONLY the default branch — we never execute PR code.
      # All PR file content is read via the GitHub API.
      - name: Checkout trusted scripts
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ca-certificates curl

      - name: Install Playwright
        run: |
          npm install -D @playwright/test
          npx playwright install-deps chromium
          npx playwright install chromium

      - name: Triage PR
        uses: actions/github-script@v9
        with:
          github-token: ${{ env.PAT }}
          script: |
            // ── Load shared helpers ────────────────────────────
            const H = require(`${process.env.GITHUB_WORKSPACE}/.github/scripts/pr-helpers.js`);
            const {
              DIRS, LABELS, SHARED_MSG, FLOW_MSG,
              bidirNotFoundMsg, buildFooter,
              isNonEmptyString, parseJsonSafe, normalizeUrl,
              extractTitle, verifyBacklink, formatBacklinkDebug,
              validateEntry, checkUrlReachability,
            } = H;

            const MSG = Object.assign({}, SHARED_MSG, FLOW_MSG.triage);

            process.env.GH_TOKEN = process.env.PAT;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pull_number = context.payload.pull_request.number;

            // ── GitHub API helpers (depend on gh CLI / context) ──

            async function createComment(body) {
              const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
              const fullBody = body + buildFooter(runUrl);
              try {
                const { execSync } = require('child_process');
                execSync(`gh api /repos/${owner}/${repo}/issues/${pull_number}/comments --method POST --input -`, {
                  input: JSON.stringify({ body: fullBody }),
                  encoding: 'utf8',
                  timeout: 15000,
                });
              } catch (e) {
                core.error(`createComment failed: ${e?.message || e}`);
              }
            }

            async function getTextFileFromRepo(path, ref) {
              const { execSync } = require('child_process');
              const result = execSync(
                `gh api /repos/${owner}/${repo}/contents/${encodeURIComponent(path)}?ref=${encodeURIComponent(ref)} --jq .content`,
                { encoding: 'utf8', timeout: 15000 }
              ).trim();
              if (!result) throw new Error(`Invalid content response for ${path}`);
              return Buffer.from(result, 'base64').toString('utf8');
            }

            async function getSiteBase() {
              try {
                const raw = await getTextFileFromRepo(
                  'config/site.json',
                  context.payload.repository.default_branch
                );
                const parsed = JSON.parse(raw);
                return parsed.url || null;
              } catch (e) {
                core.warning(`Failed to read config/site.json: ${e?.message || e}`);
                return null;
              }
            }

            async function ensureLabel(name) {
              const { execSync } = require('child_process');
              try {
                execSync(
                  `gh api /repos/${owner}/${repo}/labels/${encodeURIComponent(name)} --method GET --silent`,
                  { encoding: 'utf8', timeout: 15000 }
                );
              } catch (e) {
                const errMsg = e?.stderr?.toString() || e?.message || String(e);
                if (!errMsg.includes('404')) throw e;
                execSync(`gh api /repos/${owner}/${repo}/labels --method POST --input -`, {
                  input: JSON.stringify({ name, color: 'ededed' }),
                  encoding: 'utf8',
                  timeout: 15000,
                });
              }
            }

            async function listAllFiles() {
              const { execSync } = require('child_process');
              const result = execSync(
                `gh api /repos/${owner}/${repo}/pulls/${pull_number}/files --paginate --jq '.[]'`,
                { encoding: 'utf8', timeout: 30000 }
              );
              return result
                .trim()
                .split('\n')
                .filter(Boolean)
                .map((l) => JSON.parse(l));
            }

            async function setLabels({ addLabels, removeLabels, skipIfSame }) {
              const addSet = new Set(addLabels || []);
              const removeSet = new Set(removeLabels || []);
              for (const x of addSet) removeSet.delete(x);

              const payloadPR = context.payload.pull_request || context.payload.issue || {};
              const currentLabels = new Set((payloadPR.labels || []).map((l) => l.name));

              if (skipIfSame) {
                // Only skip when the label state would not change at all.
                // The old logic returned early as soon as *any* add-label already
                // existed, which meant label transitions (e.g. 头像可达→头像不可达)
                // were silently dropped on re-runs.
                const needsRemoval = Array.from(removeSet).some((name) => currentLabels.has(name));
                const needsAddition = Array.from(addSet).some((name) => !currentLabels.has(name));
                if (!needsRemoval && !needsAddition) {
                  core.info('Label state unchanged, skipping label operations');
                  return;
                }
              }

              const { execSync } = require('child_process');

              const finalRemove = Array.from(removeSet).filter((name) => currentLabels.has(name));
              for (const name of finalRemove) {
                try {
                  execSync(
                    `gh api /repos/${owner}/${repo}/issues/${pull_number}/labels/${encodeURIComponent(name)} --method DELETE --silent`,
                    { encoding: 'utf8', timeout: 15000 }
                  );
                } catch (e) {
                  const errMsg = e?.stderr?.toString() || e?.message || String(e);
                  if (!errMsg.includes('404')) throw e;
                }
              }

              const finalAdd = Array.from(addSet).filter((name) => !currentLabels.has(name));
              if (finalAdd.length) {
                execSync(`gh api /repos/${owner}/${repo}/issues/${pull_number}/labels --method POST --input -`, {
                  input: JSON.stringify({ labels: finalAdd }),
                  encoding: 'utf8',
                  timeout: 15000,
                });
              }
            }

            function ghAddLabels(labels) {
              const { execSync } = require('child_process');
              execSync(`gh api /repos/${owner}/${repo}/issues/${pull_number}/labels --method POST --input -`, {
                input: JSON.stringify({ labels }),
                encoding: 'utf8',
                timeout: 15000,
              });
            }

            function ghRemoveLabel(name) {
              const { execSync } = require('child_process');
              try {
                execSync(
                  `gh api /repos/${owner}/${repo}/issues/${pull_number}/labels/${encodeURIComponent(name)} --method DELETE --silent`,
                  { encoding: 'utf8', timeout: 15000 }
                );
              } catch (e) {
                const errMsg = e?.stderr?.toString() || e?.message || String(e);
                if (!errMsg.includes('404')) throw e;
              }
            }

            // ── Begin triage logic ──────────────────────────────

            // Ensure all labels exist
            for (const name of [
              LABELS.FRIEND, LABELS.SPONSOR,
              LABELS.AVATAR_OK, LABELS.AVATAR_BAD,
              LABELS.SITE_OK, LABELS.SITE_BAD,
              LABELS.ALL_OK, LABELS.BIDIR, LABELS.BIDIR_OK,
            ]) {
              await ensureLabel(name);
            }

            const files = await listAllFiles();

            if (files.length !== 1) {
              await createComment(MSG.PR_ONE_FILE);
              return;
            }
            const file = files[0];
            if (!file.filename.startsWith(DIRS.FRIENDS_DIR) && !file.filename.startsWith(DIRS.SPONSORS_DIR)) {
              await createComment(MSG.PR_PATH_ERROR);
              return;
            }
            if (file.status !== 'added' && file.status !== 'modified' && file.status !== 'removed') {
              await createComment(MSG.PR_ACTION_ERROR);
              return;
            }

            const touchedFriends = file.filename.startsWith(DIRS.FRIENDS_DIR);
            const touchedSponsors = file.filename.startsWith(DIRS.SPONSORS_DIR);

            // Set friend/sponsor labels
            const add = [];
            const remove = [];
            if (touchedFriends) add.push(LABELS.FRIEND);
            if (touchedSponsors) add.push(LABELS.SPONSOR);
            if (touchedFriends && !touchedSponsors) remove.push(LABELS.SPONSOR);
            if (touchedSponsors && !touchedFriends) remove.push(LABELS.FRIEND);

            if (add.length) ghAddLabels(add);
            for (const name of remove) ghRemoveLabel(name);

            // ── Read site base ──────────────────────────────────
            const siteBase = await getSiteBase();

            // ── Filter relevant files ───────────────────────────
            const relevant = files.filter((f) => {
              if (f.filename.startsWith(DIRS.FRIENDS_DIR)) return true;
              if (f.filename.startsWith(DIRS.SPONSORS_DIR)) return true;
              return false;
            });

            // ── Domain ownership verification (remove / modify) ──
            if (relevant.length === 1 && (relevant[0].status === 'removed' || relevant[0].status === 'modified')) {
              const f = relevant[0];
              const isDelete = f.status === 'removed';
              try {
                const raw = await getTextFileFromRepo(f.filename, context.payload.pull_request.base.sha);
                const parsed = parseJsonSafe(raw);
                if (parsed.ok && parsed.value && parsed.value.url) {
                  let hostname;
                  try { hostname = new URL(parsed.value.url).hostname; } catch {}

                  if (hostname) {
                    const dns = require('dns').promises;
                    const expected = `acofork-verification=${pull_number}`;
                    const domains = [hostname, `_acofork-verification.${hostname}`];
                    let verified = false;

                    for (const d of domains) {
                      try {
                        const records = await dns.resolveTxt(d);
                        const flat = records.flat();
                        if (flat.some((t) => t.includes(expected))) {
                          verified = true;
                          break;
                        }
                      } catch (dnsErr) {
                        core.info(`DNS TXT lookup failed for ${d}: ${dnsErr?.message || dnsErr}`);
                      }
                    }

                    if (!verified) {
                      for (const proto of ['https', 'http']) {
                        try {
                          const ctrl = new AbortController();
                          const t = setTimeout(() => ctrl.abort(), 10000);
                          const r = await fetch(`${proto}://${hostname}/acofork-verification.html`, {
                            signal: ctrl.signal,
                          });
                          clearTimeout(t);
                          const text = (await r.text()).trim();
                          if (text === expected) {
                            verified = true;
                            break;
                          }
                        } catch (fetchErr) {
                          core.info(`HTTP verification failed for ${proto}://${hostname}: ${fetchErr?.message || fetchErr}`);
                        }
                      }
                    }

                    if (!verified) {
                      await createComment(
                        MSG.DNS_VERIFY_FAIL + '\n\n' + MSG.DNS_VERIFY_INSTRUCTIONS(isDelete, hostname, expected)
                      );
                      return;
                    }

                    if (isDelete) {
                      const { execSync } = require('child_process');
                      execSync(`gh api /repos/${owner}/${repo}/pulls/${pull_number}/merge --method PUT --input -`, {
                        input: JSON.stringify({ merge_method: 'squash' }),
                        encoding: 'utf8',
                        timeout: 15000,
                      });
                      return;
                    }
                  }
                }
              } catch (e) {
                core.warning(`Ownership check failed: ${e?.message || e}`);
              }
            }

            // ── JSON extension check ────────────────────────────
            const invalidSuffix = relevant.filter((f) => !f.filename.endsWith('.json')).map((f) => f.filename);
            if (invalidSuffix.length) {
              await createComment(MSG.JSON_EXT_ERROR + '\n\n' + invalidSuffix.map((p) => `- ${p}`).join('\n'));
              return;
            }

            // Deleting a JSON file — done after ownership check
            if (relevant.length === 1 && relevant[0].status === 'removed') return;

            // ── Parse & validate JSON entries ───────────────────
            const headSha = context.payload.pull_request.head.sha;
            const parsedEntries = [];
            const errors = [];

            for (const f of relevant) {
              const raw = await getTextFileFromRepo(f.filename, headSha);
              const parsed = parseJsonSafe(raw);
              if (!parsed.ok) {
                errors.push(`${f.filename}${MSG.JSON_PARSE_ERROR}（${parsed.error}）`);
                continue;
              }
              if (!parsed.value || typeof parsed.value !== 'object' || Array.isArray(parsed.value)) {
                errors.push(`${f.filename}${MSG.JSON_OBJECT_ERROR}`);
                continue;
              }
              const kind = f.filename.startsWith(DIRS.FRIENDS_DIR) ? 'friend' : 'sponsor';
              parsedEntries.push({ path: f.filename, kind, data: parsed.value });
            }

            for (const e of parsedEntries) {
              const err = validateEntry(e);
              if (err) errors.push(err);
            }

            if (errors.length) {
              await createComment([MSG.VALIDATE_FAIL, '', ...errors.map((x) => `- ${x}`)].join('\n'));
              return;
            }

            // ── VIP check ───────────────────────────────────────
            const vipPaths = parsedEntries
              .filter((e) => Object.prototype.hasOwnProperty.call(e.data, 'vip'))
              .map((e) => e.path);
            if (vipPaths.length) {
              await createComment([MSG.VIP_DETECTED, '', ...vipPaths.map((p) => `- ${p}`)].join('\n'));
              return;
            }

            // ── Determine primary entry ─────────────────────────
            const primaryKind = touchedSponsors ? 'sponsor' : 'friend';
            const primary = parsedEntries.find((e) => e.kind === primaryKind) || parsedEntries[0];

            // ── Update PR title ─────────────────────────────────
            {
              const { execSync } = require('child_process');
              execSync(`gh api /repos/${owner}/${repo}/pulls/${pull_number} --method PATCH --input -`, {
                input: JSON.stringify({ title: `${primary.kind === 'friend' ? '友链' : '赞助'}：${primary.data.name}` }),
                encoding: 'utf8',
                timeout: 15000,
              });
            }

            // ── Avatar / Site reachability ──────────────────────
            const avatarUrl = normalizeUrl(primary.data.avatar, siteBase);
            const siteUrl = normalizeUrl(primary.data.url, siteBase);
            const selfSite = siteBase ? siteBase.replace(/\/$/, '') : null;
            const normalizedSiteUrl = siteUrl ? siteUrl.replace(/\/$/, '') : null;

            if (primary.kind === 'friend' && selfSite && normalizedSiteUrl === selfSite) {
              await createComment(MSG.URL_SELF_ERROR);
              return;
            }

            const avatarCheck = avatarUrl
              ? await checkUrlReachability(avatarUrl)
              : { ok: false, error: 'Invalid avatar URL' };
            const siteCheck =
              primary.kind === 'friend'
                ? siteUrl
                  ? await checkUrlReachability(siteUrl)
                  : { ok: false, error: 'Invalid site URL' }
                : siteUrl
                  ? await checkUrlReachability(siteUrl)
                  : null;

            // Build reachability labels
            const addReach = [];
            const removeReach = [
              LABELS.AVATAR_OK, LABELS.AVATAR_BAD,
              LABELS.SITE_OK, LABELS.SITE_BAD,
              LABELS.ALL_OK,
            ];

            addReach.push(avatarCheck.ok ? LABELS.AVATAR_OK : LABELS.AVATAR_BAD);
            if (siteCheck) addReach.push(siteCheck.ok ? LABELS.SITE_OK : LABELS.SITE_BAD);

            const allOk = avatarCheck.ok && (!siteCheck || siteCheck.ok);
            if (allOk && siteCheck) addReach.push(LABELS.ALL_OK);

            await setLabels({ addLabels: addReach, removeLabels: removeReach, skipIfSame: true });

            // ── Report reachability failures with status code ───
            if (!avatarCheck.ok || (siteCheck && !siteCheck.ok)) {
              const detailLines = ['URL 可达性检测未通过：', ''];
              if (!avatarCheck.ok) {
                const reason = avatarCheck.status
                  ? `HTTP ${avatarCheck.status}`
                  : (avatarCheck.error || '未知错误');
                detailLines.push(`- 头像不可达：${avatarUrl}（${reason}）`);
              }
              if (siteCheck && !siteCheck.ok) {
                const reason = siteCheck.status
                  ? `HTTP ${siteCheck.status}`
                  : (siteCheck.error || '未知错误');
                detailLines.push(`- 网站不可达：${siteUrl}（${reason}）`);
              }
              detailLines.push('', '请确认链接可正常访问后 push 更新。');
              await createComment(detailLines.join('\n'));
              // Stop here — let the user fix reachability before we ask
              // them to set up backlinks (otherwise the "基础校验已通过"
              // header in BIDIR_INSTRUCTIONS would contradict this failure).
              return;
            }

            // ── Auto-merge for modified entries that pass ───────
            if (relevant.length === 1 && relevant[0].status === 'modified' && allOk) {
              try {
                const { execSync } = require('child_process');
                execSync(`gh api /repos/${owner}/${repo}/pulls/${pull_number}/merge --method PUT --input -`, {
                  input: JSON.stringify({ merge_method: 'squash' }),
                  encoding: 'utf8',
                  timeout: 15000,
                });
                return;
              } catch (mergeErr) {
                core.warning(`Auto-merge (modified entry) failed: ${mergeErr?.message || mergeErr}`);
                await createComment(`${MSG.MERGE_FAIL}${mergeErr?.message || mergeErr}`);
              }
            }

            // ── Backlink verification (friend PRs only) ─────────
            if (primary.kind !== 'friend') return;

            if (!siteBase) {
              await createComment(MSG.SITE_CONFIG_MISSING);
              return;
            }

            const existingLabelNames = new Set((context.payload.pull_request.labels || []).map((l) => l.name));
            if (!existingLabelNames.has(LABELS.BIDIR) && !existingLabelNames.has(LABELS.BIDIR_OK)) {
              ghAddLabels([LABELS.BIDIR]);
            }

            const expected = siteBase.replace(/\/$/, '');
            const backlink = primary.data.backlink;

            // No backlink — instruct the user
            if (!isNonEmptyString(backlink)) {
              await setLabels({ addLabels: [LABELS.BIDIR], removeLabels: [LABELS.BIDIR_OK] });
              await createComment(MSG.BIDIR_INSTRUCTIONS(siteBase));
              return;
            }

            // Validate backlink URL
            let backlinkUrl;
            try {
              backlinkUrl = new URL(backlink).toString();
            } catch {
              await setLabels({ addLabels: [LABELS.BIDIR], removeLabels: [LABELS.BIDIR_OK] });
              await createComment(`${MSG.BIDIR_BACKLINK_INVALID}（${backlink}）`);
              return;
            }
            if (!backlinkUrl.startsWith('http://') && !backlinkUrl.startsWith('https://')) {
              await setLabels({ addLabels: [LABELS.BIDIR], removeLabels: [LABELS.BIDIR_OK] });
              await createComment(`${MSG.BIDIR_BACKLINK_NOT_HTTP}（${backlink}）`);
              return;
            }

            // Host consistency check
            let siteUrlObj;
            try {
              siteUrlObj = new URL(siteUrl);
            } catch {
              await setLabels({ addLabels: [LABELS.BIDIR], removeLabels: [LABELS.BIDIR_OK] });
              await createComment(MSG.BIDIR_SITE_INVALID);
              return;
            }
            const backlinkHost = new URL(backlinkUrl).host.toLowerCase();
            const siteHost = siteUrlObj.host.toLowerCase();
            if (backlinkHost !== siteHost) {
              await setLabels({ addLabels: [LABELS.BIDIR], removeLabels: [LABELS.BIDIR_OK] });
              await createComment(
                [MSG.BIDIR_HOST_MISMATCH, '', `url：${siteUrlObj.toString()}`, `backlink：${backlinkUrl}`].join('\n')
              );
              return;
            }

            // Fetch backlink page
            const fetched = await checkUrlReachability(backlinkUrl);
            if (!fetched.ok) {
              await setLabels({ addLabels: [LABELS.BIDIR], removeLabels: [LABELS.BIDIR_OK] });
              await createComment(
                [
                  `${MSG.BIDIR_ACCESS_FAIL}（状态码：${fetched.status || fetched.error || 'unknown'}）。`,
                  '',
                  `backlink：${backlinkUrl}`,
                  formatBacklinkDebug({
                    finalUrl: fetched.finalUrl,
                    status: fetched.status,
                  }),
                ].join('\n')
              );
              return;
            }

            // Verify the backlink content
            const html = fetched.body || '';
            const result = verifyBacklink(html, expected);

            if (!result.found) {
              await setLabels({ addLabels: [LABELS.BIDIR], removeLabels: [LABELS.BIDIR_OK] });
              const debugInfo = {
                finalUrl: fetched.finalUrl,
                status: fetched.status,
                contentType: fetched.contentType,
                title: extractTitle(html),
                foundLinksCount: result.links.length,
                sampleLinks: result.links.slice(0, 5).join(', '),
              };
              await createComment(
                bidirNotFoundMsg(siteBase, backlinkUrl) +
                  formatBacklinkDebug(debugInfo) +
                  '\n\n请添加后 push 更新（无需评论）。'
              );
              return;
            }

            // Backlink verified — set OK label and auto-merge
            await setLabels({ addLabels: [LABELS.BIDIR_OK], removeLabels: [LABELS.BIDIR] });

            try {
              const { execSync } = require('child_process');
              execSync(`gh api /repos/${owner}/${repo}/pulls/${pull_number}/merge --method PUT --input -`, {
                input: JSON.stringify({ merge_method: 'squash' }),
                encoding: 'utf8',
                timeout: 15000,
              });
            } catch (mergeErr) {
              await createComment(`${MSG.MERGE_FAIL}${mergeErr?.message || mergeErr}`);
            }

  # ═══════════════════════════════════════════════════════════════
  #  Job 2 — User commented "准备完毕"
  # ═══════════════════════════════════════════════════════════════
  verify_and_merge:
    if: ${{ github.event_name == 'issue_comment' && github.event.issue.pull_request && github.event.comment.body == '准备完毕' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout trusted scripts
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ca-certificates curl

      - name: Install Playwright
        run: |
          npm install -D @playwright/test
          npx playwright install-deps chromium
          npx playwright install chromium

      - name: Verify and merge
        uses: actions/github-script@v9
        with:
          github-token: ${{ env.PAT }}
          script: |
            // ── Load shared helpers ────────────────────────────
            const H = require(`${process.env.GITHUB_WORKSPACE}/.github/scripts/pr-helpers.js`);
            const {
              DIRS, LABELS, SHARED_MSG, FLOW_MSG,
              buildFooter,
              isNonEmptyString, parseJsonSafe, normalizeUrl,
              verifyBacklink,
              validateEntry, checkUrlReachability,
            } = H;

            const MSG = Object.assign({}, SHARED_MSG, FLOW_MSG.verify);

            process.env.GH_TOKEN = process.env.PAT;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pull_number = context.payload.issue.number;

            // ── GitHub API helpers ──────────────────────────────

            async function createComment(body) {
              const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
              const fullBody = body + buildFooter(runUrl);
              try {
                const { execSync } = require('child_process');
                execSync(`gh api /repos/${owner}/${repo}/issues/${pull_number}/comments --method POST --input -`, {
                  input: JSON.stringify({ body: fullBody }),
                  encoding: 'utf8',
                  timeout: 15000,
                });
              } catch (e) {
                core.error(`createComment failed: ${e?.message || e}`);
              }
            }

            async function getTextFileFromRepo(path, ref) {
              const { execSync } = require('child_process');
              const result = execSync(
                `gh api /repos/${owner}/${repo}/contents/${encodeURIComponent(path)}?ref=${encodeURIComponent(ref)} --jq .content`,
                { encoding: 'utf8', timeout: 15000 }
              ).trim();
              if (!result) throw new Error(`Invalid content response for ${path}`);
              return Buffer.from(result, 'base64').toString('utf8');
            }

            async function getSiteBase(defaultBranch) {
              try {
                const raw = await getTextFileFromRepo('config/site.json', defaultBranch);
                const parsed = JSON.parse(raw);
                return parsed.url || null;
              } catch (e) {
                core.warning(`Failed to read config/site.json: ${e?.message || e}`);
                return null;
              }
            }

            async function setLabels({ addLabels, removeLabels, skipIfSame }) {
              const addSet = new Set(addLabels || []);
              const removeSet = new Set(removeLabels || []);
              for (const x of addSet) removeSet.delete(x);

              const payloadPR = context.payload.pull_request || context.payload.issue || {};
              const currentLabels = new Set((payloadPR.labels || []).map((l) => l.name));

              if (skipIfSame) {
                // Only skip when the label state would not change at all.
                // The old logic returned early as soon as *any* add-label already
                // existed, which meant label transitions (e.g. 头像可达→头像不可达)
                // were silently dropped on re-runs.
                const needsRemoval = Array.from(removeSet).some((name) => currentLabels.has(name));
                const needsAddition = Array.from(addSet).some((name) => !currentLabels.has(name));
                if (!needsRemoval && !needsAddition) {
                  core.info('Label state unchanged, skipping label operations');
                  return;
                }
              }

              const { execSync } = require('child_process');

              const finalRemove = Array.from(removeSet).filter((name) => currentLabels.has(name));
              for (const name of finalRemove) {
                try {
                  execSync(
                    `gh api /repos/${owner}/${repo}/issues/${pull_number}/labels/${encodeURIComponent(name)} --method DELETE --silent`,
                    { encoding: 'utf8', timeout: 15000 }
                  );
                } catch (e) {
                  const errMsg = e?.stderr?.toString() || e?.message || String(e);
                  if (!errMsg.includes('404')) throw e;
                }
              }

              const finalAdd = Array.from(addSet).filter((name) => !currentLabels.has(name));
              if (finalAdd.length) {
                execSync(`gh api /repos/${owner}/${repo}/issues/${pull_number}/labels --method POST --input -`, {
                  input: JSON.stringify({ labels: finalAdd }),
                  encoding: 'utf8',
                  timeout: 15000,
                });
              }
            }

            // ── Fetch PR metadata ───────────────────────────────
            const { execSync: _g } = require('child_process');
            const prRaw = JSON.parse(
              _g(`gh api /repos/${owner}/${repo}/pulls/${pull_number}`, {
                encoding: 'utf8',
                timeout: 15000,
              })
            );
            const pr = {
              labels: (prRaw.labels || []).map((l) => l.name),
              data: {
                head: { sha: prRaw.head.sha },
                base: {
                  sha: prRaw.base.sha,
                  repo: { default_branch: prRaw.base.repo.default_branch },
                },
              },
            };

            const prLabels = new Set(pr.labels);

            if (!prLabels.has(LABELS.FRIEND) && !prLabels.has(LABELS.SPONSOR)) {
              core.info('PR does not have friend/sponsor labels — skipping verify_and_merge');
              return;
            }

            // BIDIR_OK already set = backlink was previously verified.
            // Proceed to re-verify and merge — don't block with a
            // stale "please fill in backlink" message.

            // ── List PR files ───────────────────────────────────
            const { execSync: _ls } = require('child_process');
            const files = (() => {
              const out = _ls(
                `gh api /repos/${owner}/${repo}/pulls/${pull_number}/files --paginate --jq '.[]'`,
                { encoding: 'utf8', timeout: 30000 }
              );
              return out
                .trim()
                .split('\n')
                .filter(Boolean)
                .map((l) => JSON.parse(l));
            })();

            if (files.length !== 1) {
              await createComment(MSG.PR_ONE_FILE);
              return;
            }
            const file = files[0];
            if (!file.filename.startsWith(DIRS.FRIENDS_DIR) && !file.filename.startsWith(DIRS.SPONSORS_DIR)) {
              await createComment(MSG.PR_PATH_ERROR);
              return;
            }
            if (file.status !== 'added' && file.status !== 'modified' && file.status !== 'removed') {
              await createComment(MSG.PR_ACTION_ERROR);
              return;
            }

            const relevant = files;

            // ── Domain ownership verification (remove / modify) ──
            if (relevant.length === 1 && (relevant[0].status === 'removed' || relevant[0].status === 'modified')) {
              const f = relevant[0];
              const isDelete = f.status === 'removed';
              try {
                const raw = await getTextFileFromRepo(f.filename, pr.data.base.sha);
                const parsed = parseJsonSafe(raw);
                if (parsed.ok && parsed.value && parsed.value.url) {
                  let hostname;
                  try { hostname = new URL(parsed.value.url).hostname; } catch {}

                  if (hostname) {
                    const dns = require('dns').promises;
                    const expected = `acofork-verification=${pull_number}`;
                    const domains = [hostname, `_acofork-verification.${hostname}`];
                    let verified = false;

                    for (const d of domains) {
                      try {
                        const records = await dns.resolveTxt(d);
                        const flat = records.flat();
                        if (flat.some((t) => t.includes(expected))) {
                          verified = true;
                          break;
                        }
                      } catch (dnsErr) {
                        core.info(`DNS TXT lookup failed for ${d}: ${dnsErr?.message || dnsErr}`);
                      }
                    }

                    if (!verified) {
                      for (const proto of ['https', 'http']) {
                        try {
                          const ctrl = new AbortController();
                          const t = setTimeout(() => ctrl.abort(), 10000);
                          const r = await fetch(`${proto}://${hostname}/acofork-verification.html`, {
                            signal: ctrl.signal,
                          });
                          clearTimeout(t);
                          const text = (await r.text()).trim();
                          if (text === expected) {
                            verified = true;
                            break;
                          }
                        } catch (fetchErr) {
                          core.info(`HTTP verification failed for ${proto}://${hostname}: ${fetchErr?.message || fetchErr}`);
                        }
                      }
                    }

                    if (!verified) {
                      await createComment(
                        MSG.DNS_VERIFY_FAIL +
                          '\n\n' +
                          MSG.DNS_VERIFY_INSTRUCTIONS(isDelete, hostname, expected)
                      );
                      return;
                    }

                    if (isDelete) {
                      const { execSync } = require('child_process');
                      execSync(`gh api /repos/${owner}/${repo}/pulls/${pull_number}/merge --method PUT --input -`, {
                        input: JSON.stringify({ merge_method: 'squash' }),
                        encoding: 'utf8',
                        timeout: 15000,
                      });
                      return;
                    }
                  }
                }
              } catch (e) {
                core.warning(`Ownership check failed: ${e?.message || e}`);
              }
            }

            // ── JSON extension check ────────────────────────────
            const invalidSuffix = relevant
              .filter((f) => !f.filename.endsWith('.json'))
              .map((f) => f.filename);
            if (invalidSuffix.length) {
              await createComment(MSG.JSON_EXT_ERROR + '\n\n' + invalidSuffix.map((p) => `- ${p}`).join('\n'));
              return;
            }

            if (relevant.length === 1 && relevant[0].status === 'removed') return;

            // ── Parse & validate entries ────────────────────────
            const parsedEntries = [];
            const errors = [];

            for (const f of relevant) {
              const raw = await getTextFileFromRepo(f.filename, pr.data.head.sha);
              const parsed = parseJsonSafe(raw);
              if (!parsed.ok) {
                errors.push(`${f.filename}${MSG.JSON_PARSE_ERROR}（${parsed.error}）`);
                continue;
              }
              if (!parsed.value || typeof parsed.value !== 'object' || Array.isArray(parsed.value)) {
                errors.push(`${f.filename}${MSG.JSON_OBJECT_ERROR}`);
                continue;
              }
              const kind = f.filename.startsWith(DIRS.FRIENDS_DIR) ? 'friend' : 'sponsor';
              parsedEntries.push({ path: f.filename, kind, data: parsed.value });
            }

            for (const e of parsedEntries) {
              const err = validateEntry(e);
              if (err) errors.push(err);
            }

            if (errors.length) {
              await createComment([MSG.VALIDATE_FAIL, '', ...errors.map((x) => `- ${x}`)].join('\n'));
              return;
            }

            // ── VIP check ───────────────────────────────────────
            const vipPaths = parsedEntries
              .filter((e) => Object.prototype.hasOwnProperty.call(e.data, 'vip'))
              .map((e) => e.path);
            if (vipPaths.length) {
              await createComment([MSG.VIP_DETECTED, '', ...vipPaths.map((p) => `- ${p}`)].join('\n'));
              return;
            }

            // ── Determine primary entry & update title ──────────
            const primaryKind = prLabels.has(LABELS.SPONSOR) ? 'sponsor' : 'friend';
            const primary = parsedEntries.find((e) => e.kind === primaryKind) || parsedEntries[0];

            {
              const { execSync } = require('child_process');
              execSync(`gh api /repos/${owner}/${repo}/pulls/${pull_number} --method PATCH --input -`, {
                input: JSON.stringify({ title: `${primary.kind === 'friend' ? '友链' : '赞助'}：${primary.data.name}` }),
                encoding: 'utf8',
                timeout: 15000,
              });
            }

            const siteBase = await getSiteBase(pr.data.base.repo.default_branch);

            // ── Avatar / Site reachability ──────────────────────
            const avatarUrl = normalizeUrl(primary.data.avatar, siteBase);
            const siteUrl = normalizeUrl(primary.data.url, siteBase);
            const selfSite = siteBase ? siteBase.replace(/\/$/, '') : null;
            const normalizedSiteUrl = siteUrl ? siteUrl.replace(/\/$/, '') : null;

            if (primary.kind === 'friend' && selfSite && normalizedSiteUrl === selfSite) {
              await createComment(MSG.URL_SELF_ERROR);
              return;
            }

            const avatarCheck = avatarUrl
              ? await checkUrlReachability(avatarUrl)
              : { ok: false, error: 'Invalid avatar URL' };
            const siteCheck =
              primary.kind === 'friend'
                ? siteUrl
                  ? await checkUrlReachability(siteUrl)
                  : { ok: false, error: 'Invalid site URL' }
                : siteUrl
                  ? await checkUrlReachability(siteUrl)
                  : null;

            // Build reachability labels
            const addReach = [];
            const removeReach = [
              LABELS.AVATAR_OK, LABELS.AVATAR_BAD,
              LABELS.SITE_OK, LABELS.SITE_BAD,
              LABELS.ALL_OK,
            ];

            addReach.push(avatarCheck.ok ? LABELS.AVATAR_OK : LABELS.AVATAR_BAD);
            if (siteCheck) addReach.push(siteCheck.ok ? LABELS.SITE_OK : LABELS.SITE_BAD);

            const allOk = avatarCheck.ok && (!siteCheck || siteCheck.ok);
            if (allOk && siteCheck) addReach.push(LABELS.ALL_OK);

            await setLabels({ addLabels: addReach, removeLabels: removeReach, skipIfSame: true });

            // ── Report reachability failures with status code ───
            if (!avatarCheck.ok || (siteCheck && !siteCheck.ok)) {
              const detailLines = ['URL 可达性检测未通过：', ''];
              if (!avatarCheck.ok) {
                const reason = avatarCheck.status
                  ? `HTTP ${avatarCheck.status}`
                  : (avatarCheck.error || '未知错误');
                detailLines.push(`- 头像不可达：${avatarUrl}（${reason}）`);
              }
              if (siteCheck && !siteCheck.ok) {
                const reason = siteCheck.status
                  ? `HTTP ${siteCheck.status}`
                  : (siteCheck.error || '未知错误');
                detailLines.push(`- 网站不可达：${siteUrl}（${reason}）`);
              }
              detailLines.push('', MSG.LINK_UNREACHABLE_DETAIL);
              await createComment(detailLines.join('\n'));
              return;
            }

            // ── Backlink verification (friend PR with backlink) ─
            if (primary.kind === 'friend' && isNonEmptyString(primary.data.backlink) && siteBase) {
              const expected = siteBase.replace(/\/$/, '');

              let backlinkUrl;
              try {
                backlinkUrl = new URL(primary.data.backlink).toString();
              } catch {
                core.info(`Invalid backlink URL in verify: ${primary.data.backlink}`);
                backlinkUrl = null;
              }

              if (backlinkUrl) {
                // Host consistency check (was missing in the old verify_and_merge)
                let siteUrlObj;
                try {
                  siteUrlObj = new URL(siteUrl);
                } catch {
                  siteUrlObj = null;
                }

                if (siteUrlObj) {
                  const backlinkHost = new URL(backlinkUrl).host.toLowerCase();
                  const siteHost = siteUrlObj.host.toLowerCase();
                  if (backlinkHost !== siteHost) {
                    core.warning(
                      `Backlink host mismatch in verify: ${backlinkHost} vs ${siteHost} — skipping backlink check`
                    );
                    backlinkUrl = null;
                  }
                }

                if (backlinkUrl) {
                  const fetched = await checkUrlReachability(backlinkUrl);
                  if (fetched.ok) {
                    const html = fetched.body || '';
                    const result = verifyBacklink(html, expected);
                    if (result.found) {
                      await setLabels({ addLabels: [LABELS.BIDIR_OK], removeLabels: [LABELS.BIDIR] });
                    } else {
                      core.info('Backlink page accessible but expected link not found');
                    }
                  } else {
                    core.info(`Backlink fetch failed in verify: ${fetched.status || fetched.error}`);
                  }
                }
              }
            }

            // ── Merge ───────────────────────────────────────────
            try {
              const { execSync } = require('child_process');
              execSync(`gh api /repos/${owner}/${repo}/pulls/${pull_number}/merge --method PUT --input -`, {
                input: JSON.stringify({ merge_method: 'squash' }),
                encoding: 'utf8',
                timeout: 15000,
              });
            } catch (mergeErr) {
              await createComment(MSG.MERGE_FAIL + '\n\n' + `错误信息：${mergeErr?.message || mergeErr}`);
            }
